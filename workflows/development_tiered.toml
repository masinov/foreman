[workflow]
id = "development_tiered"
name = "Tiered Development Review"
methodology = "development"

[[steps]]
id = "develop"
role = "developer"

[[steps]]
id = "triage"
role = "triage_reviewer"

[[steps]]
id = "review"
role = "frontier_reviewer"

[[steps]]
id = "test"
role = "_builtin:run_tests"

[[steps]]
id = "merge"
role = "_builtin:merge"

[[steps]]
id = "done"
role = "_builtin:mark_done"

[[transitions]]
from = "develop"
trigger = "completion:done"
to = "triage"

[[transitions]]
from = "triage"
trigger = "completion:approve"
to = "test"

[[transitions]]
from = "triage"
trigger = "completion:deny"
to = "develop"
carry_output = true

[[transitions]]
from = "triage"
trigger = "completion:escalate"
to = "review"
carry_output = true

[[transitions]]
from = "review"
trigger = "completion:approve"
to = "test"

[[transitions]]
from = "review"
trigger = "completion:deny"
to = "develop"
carry_output = true

[[transitions]]
from = "review"
trigger = "completion:steer"
to = "develop"
carry_output = true

[[transitions]]
from = "test"
trigger = "completion:success"
to = "merge"

[[transitions]]
from = "test"
trigger = "completion:failure"
to = "develop"
carry_output = true

[[transitions]]
from = "merge"
trigger = "completion:success"
to = "done"

[[transitions]]
from = "merge"
trigger = "completion:conflict"
to = "develop"
carry_output = true

[[transitions]]
from = "merge"
trigger = "completion:failure"
to = "develop"
carry_output = true

[[gates]]
trigger = "cost_exceeded"
action = "kill_and_block"
message = "Cost limit exceeded. Requires human review."

[[gates]]
trigger = "time_exceeded"
action = "kill_and_block"
message = "Time limit exceeded. Requires human review."

[fallback]
action = "block"
message = "Unhandled workflow outcome. Requires human review."
