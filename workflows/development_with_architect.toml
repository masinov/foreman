[workflow]
id = "development_with_architect"
name = "Architect-Led Development"
methodology = "development"

[[steps]]
id = "plan"
role = "architect"

[[steps]]
id = "human_approval"
role = "_builtin:human_gate"

[[steps]]
id = "develop"
role = "developer"

[[steps]]
id = "review"
role = "code_reviewer"

[[steps]]
id = "test"
role = "_builtin:run_tests"

[[steps]]
id = "merge"
role = "_builtin:merge"

[[steps]]
id = "done"
role = "_builtin:mark_done"

[[transitions]]
from = "plan"
trigger = "completion:done"
to = "human_approval"

[[transitions]]
from = "human_approval"
trigger = "completion:approve"
to = "develop"

[[transitions]]
from = "human_approval"
trigger = "completion:deny"
to = "plan"
carry_output = true

[[transitions]]
from = "develop"
trigger = "completion:done"
to = "review"

[[transitions]]
from = "review"
trigger = "completion:approve"
to = "test"

[[transitions]]
from = "review"
trigger = "completion:deny"
to = "develop"
carry_output = true

[[transitions]]
from = "review"
trigger = "completion:steer"
to = "develop"
carry_output = true

[[transitions]]
from = "test"
trigger = "completion:success"
to = "merge"

[[transitions]]
from = "test"
trigger = "completion:failure"
to = "develop"
carry_output = true

[[transitions]]
from = "merge"
trigger = "completion:success"
to = "done"

[[transitions]]
from = "merge"
trigger = "completion:failure"
to = "develop"
carry_output = true

[[gates]]
trigger = "cost_exceeded"
action = "kill_and_block"
message = "Cost limit exceeded."

[[gates]]
trigger = "time_exceeded"
action = "kill_and_block"
message = "Time limit exceeded."

[fallback]
action = "block"
message = "Unhandled workflow outcome."
